repos:
  - repo: local
    hooks:
      # All hooks are language: system on purpose: every tool resolves from the
      # project venv (uv.lock-pinned, reviewed), and the hook runner never
      # builds isolated environments or installs anything itself.
      - id: ruff_check
        name: ruff check
        entry: ruff check --force-exclude
        language: system
        'types_or': [python, pyi]
        args: [--fix, --exit-non-zero-on-fix]
        require_serial: true
      - id: ruff_format
        name: ruff format
        entry: ruff format --force-exclude
        language: system
        'types_or': [python, pyi]
        args: []
        require_serial: true
      - id: check-added-large-files
        name: Check for added large files
        entry: check-added-large-files
        language: system
      - id: check-toml
        name: Check Toml
        entry: check-toml
        language: system
        types: [toml]
      - id: check-yaml
        name: Check Yaml
        entry: check-yaml
        language: system
        types: [yaml]
      - id: end-of-file-fixer
        name: Fix End of Files
        entry: end-of-file-fixer
        language: system
        types: [text]
        stages: [pre-commit, pre-push, manual]
      - id: trailing-whitespace
        name: Trim Trailing Whitespace
        entry: trailing-whitespace-fixer
        language: system
        types: [text]
        stages: [pre-commit, pre-push, manual]
      - id: mypy
        name: mypy
        entry: env MYPYPATH=src mypy
        language: system
        types_or: [python, pyi]
        args: ["--ignore-missing-imports", "--scripts-are-modules", "--explicit-package-bases"]
        require_serial: true
        # one-off analysis scripts, not part of the typed package
        exclude: ^api-comparison/
